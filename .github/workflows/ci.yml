name: IcapFlow CI, Quality & Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Unit tests + static analysis + coverage, run against every
  # supported PHP version.
  quality-and-tests:
    name: PHP ${{ matrix.php-version }} Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: sockets
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit

      - name: Check code style (PSR-12)
        run: composer cs-check

      - name: Run static analysis
        run: composer stan

      - name: Run unit tests with coverage
        run: composer test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-php-${{ matrix.php-version }}
          path: build/coverage-html/

  # Integration tests against a real c-icap + ClamAV stack spun up via
  # docker-compose. Runs only on PHP 8.4 (the integration contract is
  # version-agnostic) to keep CI cost bounded.
  integration:
    name: Integration tests (c-icap + ClamAV)
    runs-on: ubuntu-latest
    needs: quality-and-tests
    # Don't fail the whole workflow if the public image for c-icap or
    # ClamAV is flaky — we'll know from the step status.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sockets

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start ICAP services
        run: docker compose up -d

      - name: Wait for icap-echo readiness
        run: |
          for i in $(seq 1 24); do
            if nc -z 127.0.0.1 1344; then echo "icap-echo ready"; exit 0; fi
            sleep 5
          done
          echo "icap-echo did not become ready in time" >&2
          docker compose logs icap-echo
          exit 1

      - name: Wait for icap-clamav readiness
        run: |
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 11344; then echo "icap-clamav ready"; exit 0; fi
            sleep 5
          done
          echo "icap-clamav did not become ready in time" >&2
          docker compose logs icap-clamav
          exit 1

      - name: Run integration tests (echo + ClamAV)
        env:
          ICAP_HOST: 127.0.0.1
          ICAP_PORT: 1344
          ICAP_ECHO_SERVICE: /echo
          ICAP_CLAMAV_SERVICE: /squidclamav
        run: composer test:integration

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Shut services down
        if: always()
        run: docker compose down -v

  # Mutation testing via Pest's native pest-plugin-mutate. The gate
  # numbers come from composer.json's mutation script. Flagged
  # continue-on-error so MSI jitter doesn't block merges while the
  # integration suite (which would lift covered-MSI) is still being
  # built out.
  mutation:
    name: Mutation testing (Pest)
    runs-on: ubuntu-latest
    needs: quality-and-tests
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sockets
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Pest mutation suite
        run: composer mutation

  deploy-coverage:
    name: Deploy Coverage Report
    needs: quality-and-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-php-8.5

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
